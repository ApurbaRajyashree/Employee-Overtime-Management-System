<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <style>
        * {
            box-sizing: border-box
        }

        button:hover {
            opacity: 1;
        }

        /* Float cancel and delete buttons and add an equal width */
        .cancelbtn, .deletebtn {
            float: left;
            width: 50%;
        }

        /* Add a color to the cancel button */
        .cancelbtn {
            background-color: #ccc;
            color: black;
        }

        /* Add a color to the delete button */
        .deletebtn {
            background-color: #f44336;
        }

        /* Add padding and center-align text to the container */
        .container {
            padding: 16px;
            text-align: center;
        }

        /* The Modal (background) */
        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: #474e5d;
            padding-top: 50px;
        }

        /* Modal Content/Box */
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto 15% auto; /* 5% from the top, 15% from the bottom and centered */
            border: 1px solid #888;
            width: 80%; /* Could be more or less, depending on screen size */
        }

        /* Style the horizontal ruler */
        hr {
            border: 1px solid #f1f1f1;
            margin-bottom: 25px;
        }

        /* The Modal Close Button (x) */
        .close {
            position: absolute;
            right: 35px;
            top: 15px;
            font-size: 40px;
            font-weight: bold;
            color: #f1f1f1;
        }

        .close:hover,
        .close:focus {
            color: #f44336;
            cursor: pointer;
        }

        /* Clear floats */
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        /* Change styles for cancel button and delete button on extra small screens */
        @media screen and (max-width: 300px) {
            .cancelbtn, .deletebtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Overtime System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="logout">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/logout}">Logout</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="department">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/department}">Department</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="project">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/project}">Project</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="users">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/users}">Users</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<br>
<br>
<div class="container">

    <div class="card">
        <div class="card-header">
            <h2 class="text-center">Add a Project</h2>
        </div>
        <div th:if="${param.success}">
            <div class="alert alert-info">
                You have successfully created a Project
            </div>
        </div>
        <div th:if="${param.fail}">
            <div class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
        </div>
        <div class="card-body">
            <form class="row g-3"
                  th:action="@{/project/create}"
                  method="post"
                  th:object="${project}">
                <div class="col-md-6">
                    <label for="inputProjectName" class="form-label">Project Name</label>
                    <input type="text" class="form-control" id="inputProjectName" th:field="*{projectName}">
                    <p th:errors="*{projectName}" class="text-danger"
                       th:if="${#fields.hasErrors('projectName')}"></p>
                </div>

                <div class="col-md-6">
                    <label for="inputProjectCode" class="form-label">Project Code</label>
                    <input type="text" class="form-control" id="inputProjectCode" th:field="*{projectCode}">
                    <p th:errors="*{projectCode}" class="text-danger"
                       th:if="${#fields.hasErrors('projectCode')}"></p>
                </div>

                <div class="col-md-6">
                    <label for="inputEstimateDate" class="form-label">Estimated End date</label>
                    <input type="date" class="form-control" id="inputEstimateDate" th:field="*{estimatedDueDate}">
                    <p th:errors="*{estimatedDueDate}" class="text-danger"
                       th:if="${#fields.hasErrors('estimatedDueDate')}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <select
                            id="inputDepartment"
                            class="form-select"
                            th:field="*{department}">
                        <option value="0">select option</option>
                        <option
                                th:each="department : ${departments}"
                                th:value="${department.id}"
                                th:text="${department.departmentName}"></option>
                    </select>
                    <p th:errors="*{department}" class="text-danger"
                       th:if="${#fields.hasErrors('department')}"></p>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
<br/><br>

<div class="container">
    <div class="row col-md-10">
        <h2>List of Projects</h2>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Project Name</th>
            <th>Project Code</th>
            <th>Estimated End Date</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.projectName}"></td>
            <td th:text="${project.projectCode}"></td>
            <td th:text="${project.estimatedDueDate}"></td>
            <td th:text="${project.department.departmentName}"></td>
            <td>
                <!--                <button class="open-button"  th:href="@{'/project/update' + ${project.id}}" method="put" th:object="${project}" onclick="openForm()">update</button>-->
                <a th:href="@{'/project/update' + ${project.id}}" th:target="_blank">
                    <button type="button" class="btn btn-primary">Edit</button>
                </a>

                <span>/</span>
                <button type="button" class="btn btn-primary"
                        onclick="document.getElementById('id01').style.display='block'"
                        th:href="@{'/project/delete' + ${project.id}}">Delete
                </button>

                <div id="id01" class="modal">
                    <span onclick="document.getElementById('id01').style.display='none'" class="close"
                          title="Close Modal">&times;</span>
                    <form class="modal-content"
                          action="/action_page.php"
                          th:action="@{|/project/delete/*{id}|}"
                          method="get"
                          th:object="${project}"
                    >
                        <div class="container">
                            <h1>Delete Project</h1>
                            <p>Are you sure you want to delete ?</p>
                            <div class="clearfix">
                                <button type="button" class="cancelbtn">Cancel</button>
                                <button type="submit" class="deletebtn" th:id="${project.id}" onclick="$(this).submit()">Delete</button>
                            </div>
                        </div>
                    </form>
                </div>
                <!--                <a th:href="@{'/project/delete' + ${project.id}}" method="delete" th:object="${project}">delete</a>-->
            </td>
        </tr>


        </tbody>
    </table>
    <a th:href="@{/project-member}" class="btn btn-info" role="button">Add member</a>
</div>
<script src="js/updateprojectpopup.js"></script>
<script>

    // Get the modal
    var modal = document.getElementById('id01');

    // When the user clicks anywhere outside of the modal, close it
    window.onclick = function (event) {
        if (event.target === modal) {
            modal.style.display = "none";
        }
    }

</script>
</body>
</html>
