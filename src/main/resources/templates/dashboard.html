<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <link th:href="@{~/css/time.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Overtime System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="logout">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/logout}">Logout</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="department">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/department}">Department</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="project">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/project/project}">Project</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="users">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/users}">Users</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<br>

<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div th:if="${param.success}">
                    <div class="alert alert-info">
                        You have successfully added log
                    </div>
                </div>
                <div th:if="${param.fail}">
                    <div class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>
                </div>
                <div class="card-body">
                    <form
                            method="post"
                            role="form"
                            th:action="@{/over-time-detail/add}"
                            class="form-horizontal"
                            th:object="${overTimeDetail}">

                        <div class="col-md-6">
                            <label for="inputLog" class="form-label">Log</label>
                            <input type="text" class="form-control" id="inputLog" th:field="*{logs}">
                            <p th:errors="*{logs}" class="text-danger"
                               th:if="${#fields.hasErrors('logs')}"></p>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Project</label>
                            <select
                                    id="inputProject"
                                    class="form-select"
                                    th:field="*{project}">
                                <option value="0">select option</option>
                                <option
                                        th:each="project : ${projects}"
                                        th:if="${project.projectMembers}==${principal}"
                                        th:value="${project.id}"
                                        th:text="${project.projectName}"
                                ></option>
                            </select>
                            <p th:errors="*{project}" class="text-danger"
                               th:if="${#fields.hasErrors('project')}"></p>
                        </div>

                        <div class="col-md-6">
                            <label for="inputStartTime" class="form-label">Start Time:</label>
                            <input type="time" class="form-control" id="inputStartTime" th:field="*{startTime}">
                            <p th:errors="*{startTime}" class="text-danger"
                               th:if="${#fields.hasErrors('startTime')}"></p>
                        </div>

                        <div class="col-md-6">
                            <label for="inputEndTime" class="form-label">End Time:</label>
                            <input type="time" class="form-control" id="inputEndTime" th:field="*{endTime}">
                            <p th:errors="*{endTime}" class="text-danger"
                               th:if="${#fields.hasErrors('endTime')}"></p>
                        </div>



                        <div class="form-group mb-3">
                            <button type="submit" class="btn btn-primary" >Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <br>
    <div class="container">
        <div class="row col-md-10">
            <h3>OverTime Detail</h3>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Logs</th>
                <th>Project</th>
                <th>Start Time</th>
                <th>End Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="overTimeDetail : ${overTimeDetails}">
                <td th:text="${overTimeDetail.date}"></td>
                <td th:text="${overTimeDetail.logs}"></td>
                <td th:text="${overTimeDetail.project.projectName}"></td>
                <td th:text="${overTimeDetail.startTime}"></td>
                <td th:text="${overTimeDetail.endTime}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    export default {
        data() {
            return {
                value: ''
            }
        }
    }

</script>
</body>
</html>
