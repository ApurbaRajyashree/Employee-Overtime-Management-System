<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Overtime System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="logout">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/logout}">Logout</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="department">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/department}">Department</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="project">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/project/project}">Project</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="users">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/users}">Users</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<br>
<br>
<div class="container">

    <div class="card">
        <div class="card-header">
            <h2 class="text-center">Add a department</h2>
        </div>
        <div th:if="${session.msg}">
            <h5 class="text-center text-success" th:text="${session.msg}"></h5>
            <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
        </div>
        <div th:if="${param.success}">
            <div class="alert alert-info">
                You have successfully added a new Department!
            </div>
        </div>
        <div th:if="${param.fail}">
            <div class="alert alert-danger" >
                <span th:text = "${error}"></span>
            </div>
        </div>
        <div class="card-body">
            <form class="row g-3"
                  th:action="@{/department/create}"
                  method="post"
                  th:object="${department}">
                <div class="col-md-6">
                    <label for="inputDepartmentName" class="form-label">Department Name</label>
                    <input type="text" class="form-control" id="inputDepartmentName" , th:field="*{departmentName}" required>
                    <p th:errors="*{departmentName}" class="text-danger"
                       th:if="${#fields.hasErrors('departmentName')}"></p>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
<br/><br>

<div class="container">
    <div class="row col-md-10">
        <h2>List of Departments</h2>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Department Name</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="department : ${departments}">
            <td  th:value="${department.id}" th:text="${department.departmentName}"></td>
            <td>
               <a th:href="@{'/department/delete/'+${department.id}}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>

    document.getElementById("delete-department").addEventListener("click", loadProjectId)

    function loadProjectId(){
        const attribute = document.getElementById("delete-department").value;
        const deleteLink = "/department/delete/"+attribute;
        document.getElementById("delete-link").href=deleteLink;
    }

</script>
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <a href="#" id="delete-link"> <button type="button" class="btn btn-primary" value="">Delete</button></a>
            </div>
        </div>
    </div>
</div>
</body>
</body>
</html>
