<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Project Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">Overtime System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="logout">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/logout}">Logout</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="department">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/department}">Department</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="project">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/project}">Project</a>
                </li>
            </ul>
        </div>
        <div class="collapse navbar-collapse" id="users">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/users}">Users</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<br/><br/>


<table id="dtBasicExample" class="table table-striped table-bordered table-sm" cellspacing="0" width="100%">
    <thead>
    <tr>
        <th class="th-sm">Project
        </th>
        <th class="th-sm">Member
        </th>
        <th class="th-sm">is Lead
        </th>
        <th class="th-sm"> Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="projectMember : ${projectMembers}">
        <td th:text="${projectMember.project.projectName}"></td>
        <td th:text="${projectMember.user.fullName}"></td>
        <td th:text="${projectMember.isLead}"></td>
        <td>
            <span th:action="@{/project-member/remove}" method="delete" th:object="${projectMember}">remove</span>
        </td>
    </tr>


    </tbody>
    <tfoot>
    <tr>
        <th class="th-sm">Project
        </th>
        <th class="th-sm">Member
        </th>
        <th class="th-sm">is Lead
        </th>
        <th class="th-sm"> Action</th>
    </tr>
    </tfoot>
</table>

<div class="container">

    <div class="card">
        <div class="card-header">
            <h2 class="text-center">Assign Project to User</h2>
        </div>
        <span th:value="${projectId}"/>
        <div th:if="${param.success}">
            <div class="alert alert-info">
                You have successfully added user to the project
            </div>
        </div>
        <div th:if="${param.fail}">
            <div class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
        </div>
        <div class="card-body">
            <form class="row g-3"
                  th:action="@{/project-member/add}"
                  method="post"
                  th:object="${projectMember}">
                <div class="form-group mb-3">
                    <label class="form-label">Project</label>
                    <select
                            id="inputProject"
                            class="form-select" ,
                            th:field="*{project}">
                        <option value="0">select option</option>
                        <option
                                th:each="project : ${projects}"
                                th:value="${project.id}"
                                th:text="${project.projectName}"></option>
                    </select>
                    <p th:errors="*{project}" class="text-danger"
                       th:if="${#fields.hasErrors('project')}"></p>
                </div>

                <div class="col-md-6">
                    <label class="form-label">User</label>
                    <select
                            id="inputUser"
                            class="form-select" ,
                            th:field="*{user}">
                        <option value="0">select option</option>
                        <option
                                th:each="user : ${users}"
                                th:value="${user.id}"
                                th:text="${user.fullName}"></option>
                    </select>
                    <p th:errors="*{user}" class="text-danger"
                       th:if="${#fields.hasErrors('user')}"></p>
                </div>

                <div class="form-check">
                    <input type="hidden" name="isLead" value="0">
                    <input type="checkbox" name="isLead" id="isLead" th:value="${true}">
                    <label class="form-check-label" for="isLead">
                       is Lead?
                    </label>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
</div>
</div>

</body>
</html>
