<div class="container">
    <div class="row col-md-10">
        <h2>List of Projects</h2>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Project Name</th>
            <th>Project Code</th>
            <th>Estimated End Date</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.projectName}"></td>
            <td th:text="${project.projectCode}"></td>
            <td th:text="${project.estimatedDueDate}"></td>
            <td th:text="${project.department.departmentName}"></td>
            <td>
                <a th:href="@{'/project/project-member/' +${project.id}}" class="btn btn-info">View Member</a>
                <span>/</span>
                <a  class="btn btn-primary" th:href="@{'/project/update-project/'+${project.id}}">Update</a>
                <span>/</span>
                <a th:href="@{'/project/delete/'+${project.id}}" class="btn btn-danger">Delete</a>
            </td>
        </tr>


        </tbody>
        <tfoot>
        <a  class="btn btn-primary" th:href="@{/project/create-project}" >Create Project</a>
        </tfoot>
    </table>
</div>
