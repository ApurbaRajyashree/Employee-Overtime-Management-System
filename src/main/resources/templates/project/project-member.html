<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Project Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<nav th:replace="~{layout::navbar}"></nav>
<br/><br/>

<div class="container">
    <div class="row col-md-10">
        <h2>Project Members</h2>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th class="th-sm">Project
            </th>
            <th class="th-sm">Member
            </th>
            <th class="th-sm">is Lead
            </th>
            <th class="th-sm"> Action</th>

        </tr>
        </thead>
        <tbody>
        <tr th:each="projectMember : ${projectMembers}">
            <td th:text="${projectMember.project.projectName}"></td>
            <td th:text="${projectMember.user.fullName}"></td>
            <td th:text="${projectMember.isLead}"></td>
            <td>
                <span th:action="@{/project-member/remove}" method="delete" th:object="${projectMember}">remove</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
